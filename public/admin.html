<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MI Admin · mississaugainvestor.ca</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090F;--surface:#0D1117;--card:#161B25;--border:rgba(255,255,255,0.07);
  --gold:#C49A3C;--gold-dim:rgba(196,154,60,0.1);--gold-border:rgba(196,154,60,0.25);
  --text:#E8EDF4;--muted:#6B7A90;--green:#34D399;--red:#F87171;--blue:#60A5FA;--purple:#A78BFA;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:4px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:'Outfit',sans-serif}
input:focus,select:focus,textarea:focus{outline:none!important;border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(196,154,60,0.12)!important}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;overflow-y:auto}
#main{flex:1;overflow-y:auto;padding:28px}
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}

/* Sidebar */
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:0 6px;margin-bottom:24px}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),#A07820);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.brand-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.2}
.brand-sub{font-size:10px;color:var(--muted)}
.nav-group{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin:14px 0 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .15s ease;color:var(--muted);font-size:13px;font-weight:500;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.nav-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(255,255,255,0.1);color:var(--muted);font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.nav-item.active .nav-badge{background:var(--gold);color:#000}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
.live-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.15);cursor:pointer;font-size:12px;color:var(--green);font-weight:600;margin-bottom:6px;transition:all .15s}
.live-btn:hover{background:rgba(52,211,153,0.12)}
.logout-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;color:var(--red);font-size:13px;transition:all .15s}
.logout-btn:hover{background:rgba(248,113,113,0.08)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .18s ease;font-family:'Outfit',sans-serif}
.btn-gold{background:linear-gradient(135deg,var(--gold),#A07820);color:#fff}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,154,60,0.3)}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border)!important}
.btn-ghost:hover{background:rgba(255,255,255,0.09)}
.btn-danger{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2)!important}
.btn-danger:hover{background:rgba(248,113,113,0.18)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.section-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.section-title{font-size:20px;font-weight:700;color:var(--text);font-family:'Playfair Display',serif}
.section-sub{font-size:13px;color:var(--muted);margin-top:3px}

/* Forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field .hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}
.input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-size:13px;transition:all .15s}
.input::placeholder{color:var(--muted)}
textarea.input{resize:vertical;line-height:1.6}
select.input{cursor:pointer}
.char-count{font-size:11px;color:var(--muted);float:right}
.char-count.over{color:var(--red)}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}

/* Stats */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.stat-icon{font-size:22px;margin-bottom:8px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* Table */
.list-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;transition:all .15s}
.list-item:hover{border-color:rgba(196,154,60,0.2)}
.list-thumb{width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.list-thumb img{width:100%;height:100%;object-fit:cover}
.photo-count{position:absolute;bottom:0;right:0;background:rgba(0,0,0,0.75);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px 0 0 0}
.list-info{flex:1;min-width:0}
.list-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-meta{font-size:12px;color:var(--muted)}
.list-actions{display:flex;gap:8px;flex-shrink:0}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tag-gold{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.tag-green{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
.tag-red{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.tag-blue{background:rgba(96,165,250,0.1);color:var(--blue);border:1px solid rgba(96,165,250,0.2)}
.tag-muted{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border)}

/* Image slots */
.img-slot{border:2px dashed var(--border);border-radius:12px;background:var(--surface);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
.img-slot:hover{border-color:var(--gold);background:var(--gold-dim)}
.img-slot.has-img{border-style:solid;border-color:rgba(52,211,153,0.4)}
.img-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.img-slot-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.65);padding:5px 10px;font-size:11px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.img-placeholder{padding:20px;pointer-events:none}
.img-placeholder .icon{font-size:28px;margin-bottom:6px}
.img-placeholder p{font-size:12px;color:var(--muted)}
.img-placeholder small{font-size:10px;color:var(--muted)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:22px;overflow-x:auto}
.tab{background:none;border:none;cursor:pointer;padding:9px 18px;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Alert */
.alert{border-radius:10px;padding:12px 16px;margin-bottom:18px;display:flex;gap:12px;align-items:flex-start}
.alert-info{background:rgba(96,165,250,0.07);border:1px solid rgba(96,165,250,0.2)}
.alert-gold{background:rgba(196,154,60,0.07);border:1px solid var(--gold-border)}
.alert-green{background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2)}
.alert p{font-size:13px;color:var(--muted);line-height:1.6}
.alert strong{color:var(--text)}

/* AI box */
.ai-box{background:rgba(196,154,60,0.04);border:1px solid var(--gold-border);border-radius:12px;padding:16px;margin-top:14px}
.ai-label{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:10px}
.ai-result{margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:180px;overflow-y:auto}
.ai-result pre{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;font-family:'Outfit',sans-serif}

/* Login */
.login-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:44px 38px;width:100%;max-width:380px;text-align:center}
.login-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--gold),#A07820);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 18px;box-shadow:0 0 40px rgba(196,154,60,0.25)}
.login-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-error{color:var(--red);font-size:12px;margin-bottom:10px}

/* Spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.15);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease forwards}

/* Compliance bar */
.compliance-bar{background:rgba(196,154,60,0.04);border-bottom:1px solid var(--gold-border);padding:6px 16px;text-align:center;font-size:11px;color:#8A7040}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;display:flex;align-items:center;gap:10px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:fadeUp .25s ease}
.toast-item.success{border-color:rgba(52,211,153,0.3)}
.toast-item.error{border-color:rgba(248,113,113,0.3)}

/* Responsive */
@media(max-width:768px){
  #sidebar{width:60px;padding:12px 6px}
  .sidebar-brand .brand-name,.sidebar-brand .brand-sub,.nav-item span:not(.icon),.nav-badge,.sidebar-footer .live-btn span,.logout-btn span:not(.icon){display:none}
  .nav-item{justify-content:center;padding:10px}
  #main{padding:16px}
  .grid-2,.grid-3{grid-template-columns:1fr}
}

/* Divider */
.divider{height:1px;background:var(--border);margin:20px 0}

/* Neighbourhood grid */
.hood-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* Photo strip */
.photo-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.photo-thumb{position:relative;width:80px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .main-badge{position:absolute;top:2px;left:2px;background:var(--gold);color:#000;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px}
.photo-thumb .remove-btn{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.75);color:var(--red);border:none;width:16px;height:16px;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1}
</style>
</head>
<body>

<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen" style="display:flex">
  <div class="login-card">
    <div class="login-icon">◈</div>
    <div class="login-title">Admin Dashboard</div>
    <div class="login-sub">mississaugainvestor.ca</div>
    <div id="login-error" class="login-error" style="display:none"></div>
    <input type="password" id="pass-input" class="input" placeholder="Enter password" style="text-align:center;letter-spacing:.12em;margin-bottom:12px" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn btn-gold" onclick="doLogin()" style="width:100%;justify-content:center;padding:12px">Enter Dashboard</button>
    <p style="font-size:11px;color:var(--muted);margin-top:14px">Default: hamza2025 · Change in Settings</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">◈</div>
      <div>
        <div class="brand-name">MI Admin</div>
        <div class="brand-sub">mississaugainvestor.ca</div>
      </div>
    </div>
    <nav id="nav">
      <div class="nav-group">Main</div>
      <div class="nav-item active" data-section="dashboard" onclick="nav('dashboard')"><span class="icon">📊</span><span>Dashboard</span></div>
      <div class="nav-item" data-section="listings" onclick="nav('listings')"><span class="icon">🏠</span><span>Listings</span><span class="nav-badge" id="badge-listings">0</span></div>
      <div class="nav-item" data-section="blog" onclick="nav('blog')"><span class="icon">✍️</span><span>Blog</span><span class="nav-badge" id="badge-blog">0</span></div>
      <div class="nav-item" data-section="leads" onclick="nav('leads')"><span class="icon">👥</span><span>Leads</span><span class="nav-badge" id="badge-leads">0</span></div>
      <div class="nav-group">Site</div>
      <div class="nav-item" data-section="images" onclick="nav('images')"><span class="icon">📸</span><span>Images</span></div>
      <div class="nav-item" data-section="seo" onclick="nav('seo')"><span class="icon">🔍</span><span>SEO</span></div>
      <div class="nav-item" data-section="settings" onclick="nav('settings')"><span class="icon">⚙️</span><span>Settings</span></div>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank" class="live-btn"><span style="font-size:7px">●</span><span>View Live Site</span></a>
      <div class="logout-btn" onclick="logout()"><span class="icon">🚪</span><span>Log Out</span></div>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main">
    <div id="section-dashboard" class="section fade-up"></div>
    <div id="section-listings" class="section fade-up" style="display:none"></div>
    <div id="section-blog" class="section fade-up" style="display:none"></div>
    <div id="section-leads" class="section fade-up" style="display:none"></div>
    <div id="section-images" class="section fade-up" style="display:none"></div>
    <div id="section-seo" class="section fade-up" style="display:none"></div>
    <div id="section-settings" class="section fade-up" style="display:none"></div>
  </main>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const KEYS={listings:'mi_listings',blogs:'mi_blogs',leads:'mi_leads',settings:'mi_settings',seo:'mi_seo',images:'mi_images'};
const DEFAULT_PASS='hamza2025';
const DEFAULT_SETTINGS={agentName:'Hamza Nouman',title:'Sales Representative',brokerage:'Royal LePage Signature Realty, Brokerage',phone:'647-609-1289',email:'hamza@nouman.ca',website:'https://www.hamzahomes.ca',whatsapp:'16476091289',calendly:'https://calendly.com/hamzanouman',bio:'Specializing in Mississauga investment properties with deep expertise in cap rate analysis, BRRR strategies, and the Hurontario LRT corridor.',awards:'Master Sales Award',languages:'English, Urdu, Hindi',siteMode:'demo'};
const DEFAULT_SEO={siteTitle:'Mississauga Investor | Investment Property Intelligence',siteDesc:'Find the best investment properties in Mississauga with expert analysis from Hamza Nouman, Sales Representative at Royal LePage Signature Realty, Brokerage.',keywords:'mississauga investment properties, cash flow properties mississauga, hamza nouman realtor',googleAnalytics:'',canonicalBase:'https://mississaugainvestor.ca'};
const DEFAULT_IMAGES={agentPhoto:null,heroBg:null,logoImage:null,aboutBanner:null,marketPulseBanner:null,preconBanner:null,neighbourhoods:{Clarkson:null,'Port Credit':null,Lakeview:null,'Churchill Meadows':null,Streetsville:null,'Erin Mills':null,Cooksville:null,Hurontario:null,Meadowvale:null,Malton:null}};
const DEFAULT_LISTINGS=[
  {id:'ML013',address:'1590 Carolyn Rd',neighbourhood:'Erin Mills',price:869000,beds:4,baths:3,sqft:2050,dom:67,priceReduction:12.4,estimatedRent:4300,type:'Detached',lrtAccess:false,brokerage:'Intercity Realty Inc.',hamzaScore:9.0,cashFlow:460,capRate:5.6,hamzaNotes:"HAMZA'S PICK — deep price correction on a solid Erin Mills detached. Strong rental demand, 12% off peak.",status:'active',images:[],featured:true},
  {id:'ML005',address:'915 Inverhouse Dr',neighbourhood:'Clarkson',price:975000,beds:4,baths:3,sqft:2300,dom:61,priceReduction:11.2,estimatedRent:4600,type:'Detached',lrtAccess:true,brokerage:'Sutton Group Quantum Realty Inc.',hamzaScore:9.1,cashFlow:480,capRate:5.4,hamzaNotes:'LRT corridor play. Clarkson demand is institutional — this scores 9.1 for a reason.',status:'active',images:[],featured:false},
];
const DEFAULT_BLOGS=[
  {id:'b1',title:'Top 5 Cash Flow Properties in Mississauga',slug:'top-5-cashflow-mississauga',excerpt:'Hamza breaks down the best investment opportunities in Q1 2025.',content:'',status:'published',date:'2025-03-01',tags:['investment','mississauga'],seoTitle:'',seoDesc:'',coverImage:null,views:147},
];
const DEFAULT_LEADS=[
  {id:'l1',name:'Ahmed Khan',phone:'905-555-1234',email:'ahmed@email.com',type:'Registration',date:'2025-03-08',casl:true,notes:'Cash flow under $800K'},
  {id:'l2',name:'Sarah Chen',phone:'416-555-5678',email:'',type:'Pre-Con VIP',date:'2025-03-07',casl:true,notes:'$700K-$900K, Churchill Meadows'},
  {id:'l3',name:'Mike Patel',phone:'647-555-9012',email:'mike@email.com',type:'Seller',date:'2025-03-06',casl:true,notes:'4-bed in Erin Mills, sell Q2'},
];

// ─── STORAGE ───────────────────────────────────────────────────────────────
const DB={
  get(k){try{const v=localStorage.getItem(KEYS[k]);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(KEYS[k],JSON.stringify(v));return true}catch(e){if(e.name==='QuotaExceededError')showToast('Storage full — images too large. Try smaller photos.','error');return false}},
  getPass(){return localStorage.getItem('mi_pass')||DEFAULT_PASS},
  setPass(p){localStorage.setItem('mi_pass',p)},
};

// State
let state={listings:[],blogs:[],leads:[],settings:{},seo:{},images:{}};

function loadState(){
  state.listings=DB.get('listings')||DEFAULT_LISTINGS;
  state.blogs=DB.get('blogs')||DEFAULT_BLOGS;
  state.leads=DB.get('leads')||DEFAULT_LEADS;
  state.settings=DB.get('settings')||DEFAULT_SETTINGS;
  state.seo=DB.get('seo')||DEFAULT_SEO;
  state.images=DB.get('images')||DEFAULT_IMAGES;
  // ensure neighbourhoods key exists
  if(!state.images.neighbourhoods)state.images.neighbourhoods={...DEFAULT_IMAGES.neighbourhoods};
}

function save(key){
  DB.set(key,state[key]);
  updateBadges();
}

// ─── AUTH ─────────────────────────────────────────────────────────────────
function doLogin(){
  const p=document.getElementById('pass-input').value;
  const err=document.getElementById('login-error');
  if(p===DB.getPass()){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    loadState();
    updateBadges();
    nav('dashboard');
  }else{
    err.textContent='Incorrect password.';
    err.style.display='block';
    document.getElementById('pass-input').value='';
    document.getElementById('pass-input').focus();
  }
}

function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pass-input').value='';
}

// ─── NAV ──────────────────────────────────────────────────────────────────
let currentSection='dashboard';
function nav(s){
  document.querySelectorAll('.section').forEach(el=>el.style.display='none');
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('section-'+s).style.display='block';
  document.querySelector(`[data-section="${s}"]`).classList.add('active');
  currentSection=s;
  render(s);
}

function updateBadges(){

function showToast(msg,type='success'){

async function aiWrite(prompt,system,onResult){
  try{
    const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,
        system:system||"You are Hamza Nouman's real estate content writer for mississaugainvestor.ca. Write professional, data-driven content for Mississauga real estate investors. Hamza is Sales Representative at Royal LePage Signature Realty, Brokerage.",

  }catch{onResult('AI unavailable — check Anthropic billing.');}
}

// ─── IMAGE HELPERS ─────────────────────────────────────────────────────────
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res({url:e.target.result,name:file.name,alt:''});
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function imgSlot(id,currentImg,label,sublabel,aspectRatio,onUpload,onRemove){
  const inputId='img-'+id.replace(/\s+/g,'_');
  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--text)">${label}</div>
        ${sublabel?`<div style="font-size:11px;color:var(--muted);margin-top:1px">${sublabel}</div>`:''}
      </div>
      ${currentImg?`<button class="btn btn-danger btn-sm" onclick="${onRemove}">Remove</button>`:''}
    </div>
    <div class="img-slot${currentImg?' has-img':''}" style="aspect-ratio:${aspectRatio}" 
      onclick="document.getElementById('${inputId}').click()"
      ondragover="event.preventDefault();this.style.borderColor='var(--gold)'"
      ondragleave="this.style.borderColor=''"
      ondrop="event.preventDefault();this.style.borderColor='';handleImgDrop(event,'${id}','${onUpload}')">
      ${currentImg?`
        <img src="${currentImg.url}" alt="${currentImg.alt||label}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"/>
        <div class="img-slot-overlay"><span>✓ ${currentImg.name||'uploaded'}</span><span style="color:var(--green);font-weight:700">LIVE</span></div>
      `:`
        <div class="img-placeholder">
          <div class="icon">📸</div>
          <p>Click or drag image</p>
          <small>JPG, PNG, WebP</small>
        </div>
      `}
      <input id="${inputId}" type="file" accept="image/*" style="display:none" onchange="handleImgFile(event,'${id}','${onUpload}')"/>
    </div>
  </div>`;
}

function handleImgFile(e,id,fnName){const f=e.target.files[0];if(!f)return;fileToBase64(f).then(img=>window[fnName](id,img));}
function handleImgDrop(e,id,fnName){const f=e.dataTransfer.files[0];if(!f||!f.type.startsWith('image/'))return;fileToBase64(f).then(img=>window[fnName](id,img));}

// ─── fmtK ─────────────────────────────────────────────────────────────────
function fmtK(n){return n>=1000000?'$'+(n/1000000).toFixed(2)+'M':'$'+(n/1000).toFixed(0)+'K'}

function runBlogSEO(){
  const btn=document.getElementById('b-seo-btn');
  btn.innerHTML='<span class="spinner"></span>';
  btn.disabled=true;
  const title=document.getElementById('b-title').value;
  aiWrite(`Generate SEO fields for a blog post titled "${title}" on mississaugainvestor.ca. Respond ONLY with JSON: {"seoTitle":"...","seoDesc":"...","slug":"..."}. Title max 60 chars, desc max 155 chars.`,
    'SEO expert. Respond ONLY with valid JSON, no markdown.',
    txt=>{
      try{const d=JSON.parse(txt.replace(/```json|```/g,'').trim());
        if(d.seoTitle)document.getElementById('b-seoTitle').value=d.seoTitle;
        if(d.seoDesc)document.getElementById('b-seoDesc').value=d.seoDesc;
        if(d.slug)document.getElementById('b-slug').value=d.slug;
        showToast('SEO auto-filled ✓');
      }catch{showToast('SEO auto-fill failed','error');}
      btn.innerHTML='✨ Auto-fill';
      btn.disabled=false;
    });
}

function deleteLead(id){
  if(!confirm('Delete this lead?'))return;
  state.leads=state.leads.filter(l=>l.id!==id);
  save('leads');
  render('leads');
  showToast('Lead removed');
}

function exportLeads(){
  const rows=[['Name','Phone','Email','Type','Date','Notes','CASL'],...state.leads.map(l=>[l.name,l.phone,l.email,l.type,l.date,l.notes,l.casl?'Yes':'No'])];
  const csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='mi-leads-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  showToast('Leads exported as CSV');
}

function addGalleryPhotos(listingId,files){
  const l=state.listings.find(x=>x.id===listingId);
  if(!l)return;
  if(!l.images)l.images=[];
  const promises=Array.from(files).map(f=>fileToBase64(f));
  Promise.all(promises).then(imgs=>{l.images.push(...imgs);save('listings');render('images');});
}
window.addGalleryPhotos=addGalleryPhotos;

function removeGalleryPhoto(listingId,idx){
  const l=state.listings.find(x=>x.id===listingId);
  if(!l||!l.images)return;
  l.images.splice(idx,1);
  save('listings');
  render('images');
}
window.removeGalleryPhoto=removeGalleryPhoto;

      </div>

}

        <div class="field"><label>Registration Category</label><select id="s-title" class="input"><option${s.title==='Sales Representative'?' selected':''}>Sales Representative</option><option${s.title==='Broker'?' selected':''}>Broker</option></select></div>
        <div class="field"><label>Brokerage (exact RECO name — must include "Brokerage")</label><input id="s-brokerage" class="input" value="${s.brokerage||''}"/></div>

        <div class="field"><label>Email</label><input id="s-email" class="input" type="email" value="${s.email||''}"/></div>
        <div class="field"><label>Website</label><input id="s-website" class="input" type="url" value="${s.website||''}"/></div>
        <div class="field"><label>Languages</label><input id="s-languages" class="input" value="${s.languages||''}"/></div>

        <div class="field"><label>Bio</label><textarea id="s-bio" class="input" style="height:90px">${s.bio||''}</textarea></div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px">Site Config</div>
        <div class="field"><label>Site Mode</label><select id="s-mode" class="input"><option${s.siteMode==='demo'?' selected':''} value="demo">Demo — Sample listings visible</option><option${s.siteMode==='live'?' selected':''} value="live">Live — Real TRREB data only</option></select></div>
        <div class="field"><label>WhatsApp Number (no + or spaces)</label><input id="s-whatsapp" class="input" value="${s.whatsapp||''}" placeholder="16476091289"/></div>
        <div class="field"><label>Calendly URL</label><input id="s-calendly" class="input" type="url" value="${s.calendly||''}" placeholder="https://calendly.com/..."/></div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px">Change Password</div>
        <div class="field"><label>Current Password</label><input id="s-old-pass" class="input" type="password"/></div>
        <div class="field"><label>New Password</label><input id="s-new-pass" class="input" type="password"/></div>

function saveSettings(){
  state.settings.agentName=v('s-name');state.settings.title=v('s-title');
  state.settings.brokerage=v('s-brokerage');state.settings.phone=v('s-phone');
  state.settings.email=v('s-email');state.settings.website=v('s-website');
  state.settings.languages=v('s-languages');state.settings.awards=v('s-awards');
  state.settings.bio=v('s-bio');state.settings.siteMode=v('s-mode');
  state.settings.whatsapp=v('s-whatsapp');state.settings.calendly=v('s-calendly');
  save('settings');
  showToast('Settings saved ✓');
}

function changePass(){
  const old=v('s-old-pass'),newP=v('s-new-pass'),conf=v('s-confirm-pass');
  if(old!==DB.getPass()){showToast('Current password incorrect','error');return;}
  if(newP.length<6){showToast('New password too short (min 6)','error');return;}
  if(newP!==conf){showToast('Passwords do not match','error');return;}
  DB.setPass(newP);
  showToast('Password updated ✓');
  document.getElementById('s-old-pass').value='';
  document.getElementById('s-new-pass').value='';
  document.getElementById('s-confirm-pass').value='';
}

// ─── UTILS ────────────────────────────────────────────────────────────────
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function countChars(inputId,countId,max){
  const el=document.getElementById(inputId);
  const cnt=document.getElementById(countId);
  if(!el||!cnt)return;
  const len=el.value.length;
  cnt.textContent=len+'/'+max;
  cnt.className='char-count'+(len>max?' over':'');
}

// ─── KEY BINDS ─────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(editingListing!==null){editingListing=null;render('listings');}
    if(editingBlog!==null){editingBlog=null;render('blog');}
  }
});
</script>
